name: Build and Release Go Binary for Linux

on:
  push:
    tags:
      - "v*.*.*"  # Trigger when pushing a version tag like v1.0.0

permissions:
  contents: write  # Required to create a GitHub release

jobs:
  build:
    name: Build Go Binary for Linux
    runs-on: ubuntu-latest

    strategy:
      matrix:
        goarch: [amd64, arm64]  # Linux architectures

    steps:
      - name: Checkout repository (without code history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1  # Only fetch the latest commit

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.21  # Change this if needed

     - name: Install dependencies (for CGO support)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc musl-dev sqlite3 libsqlite3-dev

      - name: Install ARM64 Cross-Compiler (if needed)
        if: matrix.goarch == 'arm64'
        run: |
          sudo apt install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            libc6-dev-arm64-cross binutils-aarch64-linux-gnu

      - name: Build binary
        run: |
          export CGO_ENABLED=1
          export GOOS=linux
          export GOARCH=${{ matrix.goarch }}
          if [ "${{ matrix.goarch }}" = "arm64" ]; then
            export CC=aarch64-linux-gnu-gcc
            export CXX=aarch64-linux-gnu-g++
          fi
          go build -v -o go_binance_bot-linux-${{ matrix.goarch }} .

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all built binaries
        uses: actions/download-artifact@v4
        with:
          path: binaries

      - name: Create GitHub Release (Binary Only)
        uses: softprops/action-gh-release@v2
        with:
          files: binaries/go_binance_bot-*
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: |
            🚀 New Linux Binary Release: **${{ github.ref_name }}**
            
            🔹 No source code is included in this release.

            Includes:
            - ✅ Linux (amd64)
            - ✅ Linux (arm64)

          draft: false
          prerelease: false
