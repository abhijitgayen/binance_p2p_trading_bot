name: Build and Release Go App for Linux

on:
  push:
    tags:
      - "v*.*.*"  # Trigger when pushing a version tag like v1.0.0

permissions:
  contents: write  # Required to create a GitHub release

jobs:
  build:
    name: Build Go Binaries for Linux
    runs-on: ubuntu-latest

    strategy:
      matrix:
        goarch: [amd64, arm64]  # Only Linux architectures

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.21  # Change this if needed

      - name: Install dependencies (if using CGO)
        run: sudo apt-get update && sudo apt-get install -y gcc musl-dev sqlite3 libsqlite3-dev

      - name: Build binary
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=${{ matrix.goarch }} go build -o go_binance_bot-linux-${{ matrix.goarch }}

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: go_binance_bot-linux-${{ matrix.goarch }}
          path: go_binance_bot-linux-${{ matrix.goarch }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all built binaries
        uses: actions/download-artifact@v4
        with:
          path: binaries

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: binaries/go_binance_bot-*
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: |
            🚀 New Linux Release: **${{ github.ref_name }}**
            
            This release includes the latest compiled binaries for Linux:
            - Linux (amd64)
            - Linux (arm64)

          draft: false
          prerelease: false
