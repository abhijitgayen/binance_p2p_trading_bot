name: Build and Release Go App for Linux

on:
  push:
    tags:
      - "v*.*.*"  # Trigger when pushing a version tag like v1.0.0

permissions:
  contents: write  # Required to create a GitHub release

jobs:
  build:
    name: Build Go Binaries for Linux
    runs-on: ubuntu-latest

    strategy:
      matrix:
        goarch: [amd64, arm64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.21  # Adjust if needed

      - name: Install dependencies (for CGO support)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc musl-dev sqlite3 libsqlite3-dev

      - name: Install ARM64 Cross-Compiler (if needed)
        if: matrix.goarch == 'arm64'
        run: |
          sudo apt install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            libc6-dev-arm64-cross binutils-aarch64-linux-gnu

      - name: Build binary
        run: |
          export CGO_ENABLED=1
          export GOOS=linux
          export GOARCH=${{ matrix.goarch }}
          if [ "${{ matrix.goarch }}" = "arm64" ]; then
            export CC=aarch64-linux-gnu-gcc
            export CXX=aarch64-linux-gnu-g++
          fi
          go build -v -o go_binance_bot-linux-${{ matrix.goarch }} .

      - name: Create binaries directory
        run: mkdir -p binaries

      - name: Move built binary to binaries directory
        run: mv go_binance_bot-linux-${{ matrix.goarch }} binaries/

      - name: List binaries
        run: ls -lah binaries/

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: go_binance_bot-linux-${{ matrix.goarch }}
          path: binaries/go_binance_bot-linux-${{ matrix.goarch }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all built binaries
        uses: actions/download-artifact@v4
        with:
          path: binaries

      - name: Move binaries to correct location
        run: |
          mv binaries/go_binance_bot-linux-amd64/go_binance_bot-linux-amd64 binaries/
          mv binaries/go_binance_bot-linux-arm64/go_binance_bot-linux-arm64 binaries/
          rm -rf binaries/go_binance_bot-linux-amd64 binaries/go_binance_bot-linux-arm64

      - name: List binaries
        run: ls -lah binaries/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: binaries/*
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            🚀 **New Linux Release: ${{ github.ref_name }}**
            
            This release includes the latest compiled binaries for Linux:
            - Linux (amd64)
            - Linux (arm64)

          draft: false
          prerelease: false
